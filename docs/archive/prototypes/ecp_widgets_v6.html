<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ЕЦП ГД — Widget Library v6</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@200;300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',sans-serif;background:#ECEEF7;color:#191C22;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C3C6D9;border-radius:99px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── APP BAR ── */
.appbar{height:58px;background:linear-gradient(135deg,#0C40B0 0%,#1857C0 55%,#2B6BD8 100%);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0;box-shadow:0 2px 16px rgba(24,87,192,.38),0 1px 0 rgba(255,255,255,.08) inset;z-index:20}
.logo-mark{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(4px)}
.ab-title{font-size:16px;font-weight:500;color:#fff;letter-spacing:.15px}
.ab-badge{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);padding:3px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.18)}
.ab-right{margin-left:auto;font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:10px}

/* ── TAB NAV ── */
.tabnav{background:#E8EAF3;border-bottom:1px solid rgba(195,198,217,.55);overflow-x:auto;white-space:nowrap;flex-shrink:0}
.tabnav::-webkit-scrollbar{height:0}
.tabnav-inner{display:inline-flex;padding:0 16px;align-items:stretch;min-width:100%}
.cat-sep{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#73778C;padding:0 10px;display:flex;align-items:center;opacity:.55}
.tbtn{height:48px;padding:0 14px;background:transparent;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Roboto',sans-serif;font-size:13px;font-weight:500;color:#43475A;white-space:nowrap;display:flex;align-items:center;gap:6px;position:relative;top:1px;border-radius:8px 8px 0 0;transition:color .15s,background .15s}
.tbtn:hover{color:#1857C0;background:rgba(24,87,192,.06)}
.tbtn.on{color:#1857C0;border-bottom-color:#1857C0}
.tnum{min-width:18px;height:18px;padding:0 5px;border-radius:5px;background:rgba(195,198,217,.45);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#43475A}
.tbtn.on .tnum{background:#D8E2FF;color:#1857C0}

/* ── SHOWCASE ── */
.showcase{flex:1;overflow-y:auto;padding:24px 28px 80px}
.sc-head{margin-bottom:24px}
.sc-title{font-size:22px;font-weight:300;color:#191C22;margin-bottom:5px;letter-spacing:-.3px}
.sc-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:#73778C;flex-wrap:wrap}
.size-sec{margin-bottom:40px}
.size-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;color:#73778C;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.size-lbl::after{content:'';flex:1;height:1px;background:rgba(195,198,217,.45)}
.new-pill{font-size:7px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;background:#D8E2FF;color:#1857C0;padding:2px 7px;border-radius:999px;flex-shrink:0}
.variants{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start}
.vwrap{display:flex;flex-direction:column;gap:7px}
.vlabel{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#73778C;display:flex;align-items:center;gap:6px}
.fullcol{width:100%}

/* ── WIDGET CARD ── */
.wcard{background:#fff;border-radius:20px;border:1px solid rgba(195,198,217,.3);box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .22s,transform .22s;position:relative}
.wcard:hover{box-shadow:0 3px 10px rgba(0,0,0,.07),0 12px 32px rgba(0,0,0,.09);transform:translateY(-2px)}
.wcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;z-index:1;border-radius:20px 20px 0 0}
.ac-p::before{background:linear-gradient(90deg,#1857C0,#5B9BF0)}
.ac-r::before{background:linear-gradient(90deg,#BA1A1A,#FF6868)}
.ac-g::before{background:linear-gradient(90deg,#1B6E36,#4CC97A)}
.ac-a::before{background:linear-gradient(90deg,#B07400,#F0B800)}
.ac-tl::before{background:linear-gradient(90deg,#006874,#00C5DB)}
.ac-pu::before{background:linear-gradient(90deg,#6B3FA0,#AB7DF6)}
.wh{padding:16px 16px 11px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(195,198,217,.25);background:rgba(250,251,255,.95);flex-shrink:0;padding-top:19px}
.wh.sm{padding:12px 14px 10px;padding-top:15px}
.wb{padding:14px 16px;flex:1;overflow:hidden;min-height:0}
.wb.sm{padding:10px 14px}
.wf{padding:8px 16px 12px;border-top:1px solid rgba(195,198,217,.25);background:rgba(250,251,255,.95);display:flex;align-items:center;flex-shrink:0}
.wi{border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wts{flex:1;min-width:0}
.wt{font-size:14px;font-weight:500;color:#191C22;letter-spacing:.05px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws{font-size:11px;color:#73778C;margin-top:1px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbtn{width:28px;height:28px;border-radius:14px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .14s;flex-shrink:0}
.mbtn:hover{background:rgba(195,198,217,.38)}

/* ── INNER COMPONENTS ── */
.lrow{border-bottom:1px solid rgba(195,198,217,.22);cursor:pointer;transition:background .1s}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:rgba(24,87,192,.03)}
.itab{border:none;cursor:pointer;padding:5px 12px;border-radius:999px;font-family:'Roboto',sans-serif;font-size:11px;font-weight:500;white-space:nowrap;transition:all .14s}
.kpi-tile{border-radius:16px;padding:14px;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s}
.kpi-tile:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.14)}
.svc-btn{border-radius:14px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;border:1px solid rgba(195,198,217,.3)}
.svc-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.fcard{background:#fff;border:1px solid rgba(195,198,217,.3);border-radius:16px;padding:12px 14px;cursor:pointer;transition:all .16s}
.fcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:rgba(195,198,217,.6)}
.addbtn{background:transparent;border:1.5px dashed rgba(195,198,217,.7);border-radius:16px;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .15s}
.addbtn:hover{background:rgba(24,87,192,.04);border-color:#1857C0}
.kcol{background:#F4F5FB;border-radius:13px;padding:9px;border:1px solid rgba(195,198,217,.3)}
.kcard{background:#fff;border:1px solid rgba(195,198,217,.25);border-radius:10px;padding:9px 10px;margin-bottom:6px;cursor:pointer;transition:all .13s}
.kcard:hover{box-shadow:0 3px 12px rgba(0,0,0,.09);transform:translateY(-1px)}
.kcard:last-child{margin-bottom:0}
.cday{text-align:center;cursor:pointer}
.cdnum{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:30px;padding:0 8px;border-radius:10px;font-size:14px;font-weight:600;line-height:1;transition:all .12s}
.cdnum:hover{background:rgba(24,87,192,.08);color:#1857C0}

/* ── CHATBOT ── */
.cbubble{padding:9px 13px;border-radius:16px;font-size:12px;line-height:1.55;max-width:88%;word-break:break-word;animation:bIn .2s cubic-bezier(.2,0,0,1) both}
.cbot{background:#EFF1FB;color:#191C22;border-bottom-left-radius:4px}
.cuser{background:linear-gradient(135deg,#1857C0,#3B7EE8);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.cinput{flex:1;border:1px solid rgba(195,198,217,.5);border-radius:20px;padding:8px 14px;font-family:'Roboto',sans-serif;font-size:12px;color:#191C22;background:#fff;outline:none;transition:border-color .14s}
.cinput:focus{border-color:#1857C0;box-shadow:0 0 0 3px rgba(24,87,192,.08)}
.csend{width:34px;height:34px;border-radius:17px;background:linear-gradient(135deg,#1857C0,#3B7EE8);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .14s;box-shadow:0 2px 8px rgba(24,87,192,.35)}
.csend:hover{opacity:.9}
.cdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#73778C;animation:dp 1.2s ease infinite}

@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes bIn{from{opacity:0;transform:scale(.95) translateY(5px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes dp{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
.fu{animation:slideUp .28s cubic-bezier(.2,0,0,1) both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useEffect,useMemo,useState,useRef,useCallback}=React;

/* ── TOKENS ── */
const C={
  p:'#1857C0',pC:'#D8E2FF',pCOn:'#001259',pM:'#3B7EE8',
  r:'#BA1A1A',rC:'#FFDAD6',rCOn:'#410002',rM:'#E53935',
  a:'#7D5700',aC:'#FFDEA9',aCOn:'#281800',aM:'#E08C00',
  g:'#1B6E36',gC:'#A2F6B5',gCOn:'#00210D',gM:'#2E9B58',
  tl:'#006874',tlC:'#9EEFFD',tlCOn:'#001F24',tlM:'#0097B2',
  pu:'#6B3FA0',puC:'#EBDDFF',puCOn:'#230060',puM:'#8B5CF6',
  t1:'#191C22',t2:'#43475A',t3:'#73778C',
  sf:'#FFFFFF',sf2:'#F8F9FE',sf3:'#ECEEF7',ol:'#C3C6D9'
};

const widths={compact:272,medium:360,standard:448,wide:648,xl:'100%'};
const fixedH={compact:272,medium:282};

/* ── PRIMITIVES ── */
const TLink=({children,onClick})=>(
  <button onClick={onClick} style={{background:'none',border:'none',padding:0,fontSize:12,fontWeight:500,color:C.p,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:3,fontFamily:"'Roboto',sans-serif"}}>
    {children}<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.p} strokeWidth="2.5" strokeLinecap="round"><polyline points="9,18 15,12 9,6"/></svg>
  </button>
);

const Chip=({c='p',children,sm})=>(
  <span style={{fontSize:sm?9:11,fontWeight:600,padding:sm?'2px 8px':'4px 10px',borderRadius:999,background:C[c+'C']||C.pC,color:C[c+'COn']||C.pCOn,display:'inline-block',lineHeight:1.4,letterSpacing:'.1px',whiteSpace:'nowrap'}}>{children}</span>
);

const Prog=({pct,c='p',h=4})=>(
  <div style={{height:h,background:C[c+'C']||C.pC,borderRadius:999,overflow:'hidden',flexShrink:0}}>
    <div style={{height:'100%',width:`${Math.max(0,Math.min(100,pct))}%`,background:C[c+'M']||C.pM,borderRadius:999,transition:'width .5s cubic-bezier(.4,0,.2,1)'}}/>
  </div>
);

const Av=({t,bg=C.pM,s=28})=>(
  <div style={{width:s,height:s,borderRadius:'50%',background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:s<24?8:s<30?10:12,fontWeight:700,color:'#fff',flexShrink:0,letterSpacing:'.3px',boxShadow:`0 2px 8px ${bg}55`}}>{t}</div>
);

const SChip=({active,children})=>(
  <span style={{fontSize:10,fontWeight:600,padding:'4px 9px',borderRadius:8,background:active?C.pC:C.sf3,color:active?C.pM:C.t2,border:`1px solid ${active?C.p+'44':C.ol+'44'}`,whiteSpace:'nowrap'}}>{children}</span>
);

const MetaRow=({scope='Отдел',subject='ОГА',period='7 дней',metric='24 задачи',delta='+8%'})=>{
  const pos=delta.startsWith('+');
  return(
    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:12,padding:'7px 10px',background:C.sf2,borderRadius:10,border:`1px solid ${C.ol}33`}}>
      <SChip active>{scope}: {subject}</SChip>
      <SChip>{period}</SChip>
      <span style={{fontSize:11,fontWeight:600,color:C.t1}}>{metric}</span>
      <span style={{fontSize:10,fontWeight:700,color:pos?C.gM:C.rM,marginLeft:'auto'}}>{pos?'↑':'↓'} {delta.replace(/^[+-]/,'')}</span>
    </div>
  );
};

const Tabs=({tabs,active,onChange,sm})=>(
  <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:12}}>
    {tabs.map(t=>(
      <button key={t.key} className="itab" onClick={()=>onChange(t.key)}
        style={{background:active===t.key?C.p:C.sf3,color:active===t.key?'#fff':C.t2,fontSize:sm?9:11,boxShadow:active===t.key?`0 2px 8px ${C.p}40`:undefined}}>
        {t.label}
      </button>
    ))}
  </div>
);

/* ── WIDGET SHELL ── */
const W=({size='standard',title,sub,iconBg,icon,badge,badgeC='p',foot,children,noFoot,acc='p'})=>{
  const cmp=size==='compact', med=size==='medium', tight=cmp||med;
  const w=widths[size]||448, fh=fixedH[size];
  return(
    <div className={`wcard ac-${acc}`} style={{width:w,fontFamily:"'Roboto',sans-serif",...(fh?{height:fh}:{})}}>
      <div className={`wh${tight?' sm':''}`}>
        <div className="wi" style={{width:cmp?30:36,height:cmp?30:36,borderRadius:cmp?9:12,background:iconBg,boxShadow:`0 2px 10px ${iconBg}55`}}>
          <div style={{transform:cmp?'scale(.82)':undefined}}>{icon}</div>
        </div>
        <div className="wts">
          <div className="wt" style={{fontSize:cmp?13:14}}>{title}</div>
          {!cmp&&sub&&<div className="ws">{sub}</div>}
        </div>
        {!tight&&badge&&<Chip c={badgeC} sm>{badge}</Chip>}
        <button className="mbtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill={C.t3}><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
        </button>
      </div>
      <div className={`wb${tight?' sm':''}`} style={{flex:1,overflow:'hidden',minHeight:0}}>{children}</div>
      {!noFoot&&<div className="wf">{foot||<TLink>Подробнее</TLink>}</div>}
    </div>
  );
};

/* ── CHART PRIMITIVES ── */
const BarSVG=({vals,colors,labels,h=70,w=220,accent})=>{
  const mx=Math.max(...vals,1),n=vals.length,bw=Math.max(8,(w-32)/n-5);
  return(
    <svg width="100%" height={h+(labels?20:0)} viewBox={`0 0 ${w} ${h+(labels?20:0)}`} preserveAspectRatio="xMidYMid meet">
      {[.25,.5,.75].map((f,i)=><line key={i} x1={8} y1={(h-8)*f} x2={w-8} y2={(h-8)*f} stroke={C.ol+'30'} strokeWidth={.7} strokeDasharray="3,5"/>)}
      {vals.map((v,i)=>{
        const bh=Math.max(4,(v/mx)*(h-14)),x=16+i*(w-32)/n+(w-32)/n/2-bw/2,y=h-bh-6;
        const col=Array.isArray(colors)?colors[i%colors.length]:colors;
        const hi=accent===i;
        return(
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} rx={5} fill={col} opacity={hi?1:.75}/>
            {hi&&<rect x={x} y={y} width={bw} height={4} rx={2} fill={col} opacity={.25}/>}
            {labels&&<text x={x+bw/2} y={h+15} textAnchor="middle" fontSize="8" fill={C.t3} fontFamily="Roboto,sans-serif" fontWeight="500">{labels[i]}</text>}
          </g>
        );
      })}
    </svg>
  );
};

const LineSVG=({datasets,h=65,w=220,fill=false})=>{
  const pathStr=pts=>{const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;return pts.map((v,i)=>`${i?'L':'M'}${10+i*(w-20)/(pts.length-1)},${8+(1-(v-mn)/rng)*(h-16)}`).join(' ');};
  const fillPath=pts=>{const p=pathStr(pts),last=10+(pts.length-1)*(w-20)/(pts.length-1);return p+`L${last},${h-4} L10,${h-4} Z`;};
  const pts2=pts=>{const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;return pts.map((v,i)=>({cx:10+i*(w-20)/(pts.length-1),cy:8+(1-(v-mn)/rng)*(h-16)}));};
  return(
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>{datasets.map((ds,i)=><linearGradient key={i} id={`lg${i}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={ds.c} stopOpacity=".22"/><stop offset="100%" stopColor={ds.c} stopOpacity="0"/></linearGradient>)}</defs>
      {[.3,.6].map((f,i)=><line key={i} x1={8} y1={h*f} x2={w-8} y2={h*f} stroke={C.ol+'28'} strokeWidth={.7} strokeDasharray="3,5"/>)}
      {datasets.map((ds,i)=>(
        <g key={i}>
          {fill&&<path d={fillPath(ds.pts)} fill={`url(#lg${i})`}/>}
          <path d={pathStr(ds.pts)} fill="none" stroke={ds.c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
          {pts2(ds.pts).map((pt,pi)=>(pi===0||pi===ds.pts.length-1)?<circle key={pi} cx={pt.cx} cy={pt.cy} r={3.5} fill={ds.c} stroke="#fff" strokeWidth={1.5}/>:null)}
        </g>
      ))}
    </svg>
  );
};

const DonutSVG=({segs,sz=72,label,sub})=>{
  const r=sz*.37,cx=sz/2,cy=sz/2,circ=2*Math.PI*r,total=segs.reduce((s,x)=>s+x.v,0)||1;
  let off=-circ/4;
  const lbl=label||(segs[0]?Math.round(segs[0].v/total*100)+'%':'');
  return(
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.ol+'40'} strokeWidth={sz*.12}/>
      {segs.map((s,i)=>{const dash=circ*s.v/total;const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth={sz*.12} strokeDasharray={`${dash} ${circ}`} strokeDashoffset={off} strokeLinecap="butt"/>;off-=dash;return el;})}
      <text x={cx} y={cy+(sub?-4:0)} textAnchor="middle" fontSize={sz*.2} fontWeight="600" fill={C.t1} dominantBaseline="middle" fontFamily="Roboto,sans-serif">{lbl}</text>
      {sub&&<text x={cx} y={cy+sz*.13} textAnchor="middle" fontSize={sz*.11} fill={C.t3} fontFamily="Roboto,sans-serif">{sub}</text>}
    </svg>
  );
};

/* ── ICONS ── */
const IcoBars=({c=C.p})=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"><rect x="2" y="13" width="5" height="8" rx="1.5"/><rect x="9.5" y="8" width="5" height="13" rx="1.5"/><rect x="17" y="3" width="5" height="18" rx="1.5"/><polyline points="2,13 8,7 14,10 20,4" strokeDasharray="2,2" stroke={C.pM} strokeWidth="1.4"/></svg>;
const IcoLine=({c=C.p})=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"><polyline points="22,7 13,7 13,22"/><polyline points="3,22 22,22"/><path d="M3 17l4-5 4 3 5-7" stroke={C.pM} strokeWidth="2"/></svg>;
const IcoWarn=({c=C.rM})=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"><polygon points="12,2 22,20 2,20" rx="2"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17.5" r=".5" fill={c} strokeWidth="2"/></svg>;
const IcoFilter=({c=C.p})=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"><path d="M4 4h16l-6 8v7l-4-2V12L4 4z"/></svg>;
const IcoStar=({c=C.gM})=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"><path d="M12 2l2.9 5.9L22 9.3l-5 4.9 1.2 6.8L12 17.8l-6.2 3.2L7 14.2 2 9.3l7.1-1.4z"/></svg>;

const botResponses={'гпзу':'Для согласования ГПЗУ подайте заявление через ИАС ОГД. Срок рассмотрения — 20 рабочих дней согласно регламенту ДГА.','задач':'У вас сейчас: 4 новые, 12 в работе, 3 просроченные. Хотите открыть полный список?','регламент':'Обновлён регламент согласования ГПЗУ — сроки сокращены до 15 дней. Документ доступен в нормативной базе.','сотрудник':'Введите имя или отдел в справочнике сотрудников — там 128 специалистов по 5 отделам.'};
const getBotReply=q=>{const ql=q.toLowerCase();for(const[k,v] of Object.entries(botResponses)){if(ql.includes(k)) return v;}return 'Обрабатываю запрос... Рекомендую обратиться к разделу «Нормативная база» или найти нужный отдел в справочнике.';};

const W17=({size='standard',state='idle'})=>{
  const [msgs,setMsgs]=useState([{role:'bot',text:'Привет! Я ИИ-ассистент ЕЦП ГД. Задайте вопрос о задачах, документах или регламентах.'}]);
  const [inp,setInp]=useState('');
  const [typing,setTyping]=useState(false);
  const msgsRef=useRef(null);
  const cmp=size==='compact',med=size==='medium',xl=size==='xl',wide=size==='wide';

  const send=useCallback((text)=>{
    if(!text.trim()) return;
    setMsgs(prev=>[...prev,{role:'user',text}]);
    setInp('');
    setTyping(true);
    setTimeout(()=>{
      setMsgs(prev=>[...prev,{role:'bot',text:getBotReply(text)}]);
      setTyping(false);
    },900);
  },[]);

  useEffect(()=>{if(msgsRef.current) msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs,typing]);

  if(cmp) return(
    <W size={size} title="AI-ассистент" iconBg={C.tlC} icon={<IcoBot/>} noFoot acc="tl">
      <div style={{display:'flex',flexDirection:'column',height:'100%',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{textAlign:'center',padding:'6px 0'}}>
          <div style={{width:52,height:52,borderRadius:'50%',background:`linear-gradient(135deg,${C.tlM},${C.p})`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px',boxShadow:`0 4px 16px ${C.tlM}66`}}>
            <IcoBot c="#fff"/>
          </div>
          <div style={{fontSize:11,fontWeight:500,color:C.t1,marginBottom:4}}>ИИ-ассистент</div>
          <div style={{fontSize:10,color:C.t3,lineHeight:1.4}}>Задайте вопрос о процессах ЕЦП ГД</div>
        </div>
        <div style={{width:'100%',display:'flex',flexDirection:'column',gap:6}}>
          {quickQ.slice(0,2).map((q,i)=>(
            <button key={i} onClick={()=>send(q)} style={{background:C.sf3,border:`1px solid ${C.ol}44`,borderRadius:999,padding:'7px 12px',fontSize:10,color:C.t2,fontWeight:500,cursor:'pointer',textAlign:'left',fontFamily:"'Roboto',sans-serif",transition:'all .14s'}}
              onMouseEnter={e=>{e.currentTarget.style.background=C.pC;e.currentTarget.style.color=C.p;e.currentTarget.style.borderColor=C.p+'44'}}
              onMouseLeave={e=>{e.currentTarget.style.background=C.sf3;e.currentTarget.style.color=C.t2;e.currentTarget.style.borderColor=`${C.ol}44`}}>
              {q}
            </button>
          ))}
        </div>
      </div>
    </W>
  );

  if(state==='idle'&&!med) return(
    <W size={size} title="AI-ассистент" sub="Задайте вопрос ИИ" iconBg={C.tlC} icon={<IcoBot/>} acc="tl" noFoot>
      <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
        <div style={{width:48,height:48,borderRadius:'50%',background:`linear-gradient(135deg,${C.tlM},${C.p})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:`0 4px 16px ${C.tlM}66`}}>
          <IcoBot c="#fff"/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:C.t2,lineHeight:1.5,marginBottom:12}}>Привет! Я помогу найти информацию о процессах, задачах и регламентах ЕЦП ГД.</div>
          <div style={{display:'grid',gridTemplateColumns:xl||wide?'repeat(2,1fr)':'1fr',gap:6}}>
            {quickQ.map((q,i)=>(
              <button key={i} onClick={()=>send(q)} style={{background:C.sf3,border:`1px solid ${C.ol}44`,borderRadius:10,padding:'9px 12px',fontSize:11,color:C.t2,fontWeight:500,cursor:'pointer',textAlign:'left',fontFamily:"'Roboto',sans-serif",transition:'all .14s'}}
                onMouseEnter={e=>{e.currentTarget.style.background=C.pC;e.currentTarget.style.color=C.p;e.currentTarget.style.borderColor=C.p+'44'}}
                onMouseLeave={e=>{e.currentTarget.style.background=C.sf3;e.currentTarget.style.color=C.t2;e.currentTarget.style.borderColor=`${C.ol}44`}}>
                {q}
              </button>
            ))}
          </div>
        </div>
      </div>
    </W>
  );

  const chatH=size==='standard'?160:size==='wide'?180:size==='xl'?200:110;
  return(
    <W size={size} title="AI-ассистент" sub="ИИ ЕЦП ГД" iconBg={C.tlC} icon={<IcoBot/>} acc="tl" noFoot>
      <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
        <div ref={msgsRef} style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',gap:8,maxHeight:chatH,overflowY:'auto',paddingBottom:4,paddingRight:2}}>
          {msgs.map((m,i)=>(
            <div key={i} className={`cbubble c${m.role==='bot'?'bot':'user'}`}>{m.text}</div>
          ))}
          {typing&&(
            <div className="cbubble cbot" style={{display:'inline-flex',gap:4,alignItems:'center',padding:'10px 14px'}}>
              <span className="cdot"/>
              <span className="cdot" style={{animationDelay:'.2s'}}/>

        <div style={{display:'flex',gap:8,alignItems:'center',paddingTop:10,borderTop:`1px solid ${C.ol}30`,marginTop:8}}>
          <input className="cinput" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send(inp);}} placeholder="Задать вопрос..."/>
          <button className="csend" onClick={()=>send(inp)}><IcoSend/></button>
        </div>
      </div>
    </W>
  );
};

const sizes=['compact','medium','standard','wide','xl'];
const sizeNewLabel={medium:'NEW',wide:'NEW'};
const sizePretty={compact:'Compact · 1×1',medium:'Medium · 1.5×1',standard:'Standard · 2×1',wide:'Wide · 3×1',xl:'XL · 4×2'};

const Showcase=({widget})=>{
  const sts=widget.states?.length?widget.states:[{key:'default',label:'Основное'}];
  return(
    <div className="fu">
      <div className="sc-head">
        <div className="sc-title">{widget.title}</div>
        <div className="sc-meta">
          <span>Material 3 · Roboto · ЕЦП ГД v6</span>
          <span>•</span>
          <span>{sts.length} состояний</span>
          <span>•</span>
          <span>5 размеров (2 новых)</span>
        </div>
      </div>
      {sts.map(st=>{
        const Comp=widget.Component;
        const hidden=(hiddenVariants[widget.id]?.[st.key])||[];
        const vis=sizes.filter(s=>!hidden.includes(s));
        if(!vis.length) return null;
        return(
          <section className="size-sec" key={st.key}>
            <div className="size-lbl">
              {st.label}
              {sts.length>1&&<span style={{fontWeight:400,textTransform:'none',fontSize:11,letterSpacing:0}}>{st.key}</span>}
            </div>
            <div className="variants">
              {vis.map(sz=>(
                <div key={sz} className={`vwrap ${sz==='xl'?'fullcol':''}`}>
                  <div className="vlabel">
                    {sizePretty[sz]}
                    {sizeNewLabel[sz]&&<span className="new-pill">{sizeNewLabel[sz]}</span>}
                  </div>
                  <Comp size={sz} state={st.key}/>
                </div>
              ))}
            </div>
          </section>
        );
      })}
    </div>
  );
};

/* ──────────────────────────────────────────────────────
   APP
────────────────────────────────────────────────────── */
const App=()=>{
  const [cat,setCat]=useState('analytics');
  const filtered=useMemo(()=>widgets.filter(w=>w.cat===cat),[cat]);
  const [active,setActive]=useState(filtered[0]?.id||'w01');
  useEffect(()=>{if(!filtered.find(w=>w.id===active)) setActive(filtered[0]?.id||'');},[cat,active,filtered]);
  return(
    <div className="app">
      <div className="appbar">
        <div className="logo-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" strokeWidth="2">
            <rect x="4" y="4" width="7" height="7" rx="2"/><rect x="13" y="4" width="7" height="7" rx="2"/>
            <rect x="4" y="13" width="7" height="7" rx="2"/><rect x="13" y="13" width="7" height="7" rx="2"/>
          </svg>
        </div>
        <div className="ab-title">ЕЦП ГД — Widget Library</div>
        <div className="ab-badge">v6</div>
        <div className="ab-right">
          <span>16 виджетов</span>
          <span style={{opacity:.4}}>·</span>
          <span>5 размеров</span>
          <span style={{opacity:.4}}>·</span>
          <span>Material 3 · Roboto</span>
        </div>
      </div>
      <div className="tabnav">
        <div className="tabnav-inner">
          {categories.map((c,idx)=>(
            <React.Fragment key={c.id}>
              {idx>0&&<div className="cat-sep">{c.label}</div>}
              <button className={`tbtn ${cat===c.id?'on':''}`} onClick={()=>setCat(c.id)}>
                {c.label}<span className="tnum">{widgets.filter(w=>w.cat===c.id).length}</span>
              </button>
            </React.Fragment>
          ))}
          <div className="cat-sep">Виджеты</div>
          {filtered.map(w=>(
            <button key={w.id} className={`tbtn ${active===w.id?'on':''}`}
              onClick={()=>{setActive(w.id);document.getElementById(`sec-${w.id}`)?.scrollIntoView({behavior:'smooth',block:'start'});}}>
              {w.title}<span className="tnum">{w.states?.length||1}</span>
            </button>
          ))}
        </div>
      </div>
      <main className="showcase">
        {filtered.map(w=>(
          <div key={w.id} id={`sec-${w.id}`} style={{scrollMarginTop:24}}>
            <Showcase widget={w}/>
          </div>
        ))}
      </main>
    </div>
  );
};

/* ── TESTS ── */
function runTests(){
  console.assert(Array.isArray(kpiData)&&kpiData.length===4,'kpiData should have 4 items');
  console.assert(Array.isArray(top5Data.performers)&&top5Data.performers.length===5,'performers should have 5 rows');
  console.assert(typeof W01==='function','W01 should be defined');
  console.assert(typeof W02==='function','W02 should be defined');
  console.assert(typeof W17==='function','W17 chatbot should be defined');
  console.assert(widgets.length===16,'widgets length should be 16');
  console.assert(widgets.find(w=>w.id==='w17'),'w17 chatbot should be in widgets array');
  console.assert((hiddenVariants.w06?.list||[]).includes('compact'),'w06 list compact should stay hidden');
  console.assert((hiddenVariants.w10?.active||[]).includes('compact'),'w10 active compact should stay hidden');
  console.assert(Object.keys(widths).length===5,'should have 5 sizes');
  console.assert(typeof getBotReply==='function','getBotReply should be defined');
  console.log('✅ All v6 tests passed — 16 widgets, 5 sizes');
}
runTests();
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
