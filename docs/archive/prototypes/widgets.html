<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ЕЦП ГД 2.0 — Главная</title>
<style>
:root{
  --bg:#F4F4F7;--surface:#fff;--surface2:#F8F8FA;
  --border:#E2E2E7;--border2:#EBEBEF;
  --t1:#1A1A1F;--t2:#6B6B72;--t3:#AEAEB5;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-mid:#378ADD;--blue-dark:#0C447C;
  --green:#2E6010;--green-bg:#EAF3DE;--green-mid:#5A9020;--green-dark:#1E4208;
  --amber:#7A4A08;--amber-bg:#FDF0DA;--amber-mid:#B87016;--amber-dark:#3E2202;
  --red:#A02828;--red-bg:#FCE8E8;--red-mid:#D94444;
  --purple:#5B2D8E;--purple-bg:#F0E8F8;
  --r:10px;--rs:6px;--rx:20px;
  --sh:0 1px 4px rgba(0,0,0,.06);--sh2:0 3px 14px rgba(0,0,0,.1);
  --hdr:56px;--preset-bar:48px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;line-height:1.45;overflow-x:hidden}

/* ── HEADER ─────────────────────────────── */
.hdr{height:var(--hdr);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.hdr-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.hdr-logo-mark svg{width:18px;height:18px;fill:#fff}
.hdr-brand{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}
.hdr-brand span{color:var(--blue)}
.hdr-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.hdr-subtitle{font-size:11px;color:var(--t3);font-weight:500}
.hdr-search{flex:1;max-width:380px;margin:0 auto;position:relative}
.hdr-search input{width:100%;height:32px;border:1px solid var(--border);border-radius:var(--rs);padding:0 12px 0 34px;font-size:12px;background:var(--surface2);color:var(--t1);outline:none;transition:.15s}
.hdr-search input:focus{border-color:var(--blue-mid);background:#fff;box-shadow:0 0 0 3px rgba(55,138,221,.12)}
.hdr-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.hdr-actions{display:flex;align-items:center;gap:4px;margin-left:auto}
.hdr-btn{width:32px;height:32px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:.15s;position:relative}
.hdr-btn:hover{background:var(--surface2);border-color:var(--blue-mid)}
.notif-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--red-mid);border-radius:50%;border:1.5px solid #fff}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hdr-user-info{font-size:11px;line-height:1.3}
.hdr-user-name{font-weight:600;color:var(--t1)}
.hdr-user-role{color:var(--t3)}

/* ── PRESET BAR ─────────────────────────── */
.preset-bar{height:var(--preset-bar);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:8px;position:sticky;top:var(--hdr);z-index:190}
.preset-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-right:4px;white-space:nowrap}
.preset-pill{padding:5px 14px;border-radius:var(--rx);font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:.15s;white-space:nowrap;color:var(--t2)}
.preset-pill:hover{border-color:var(--blue-mid);color:var(--blue)}
.preset-pill.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.preset-sep{flex:1}
.edit-btn{padding:5px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;color:var(--t2)}
.edit-btn:hover{border-color:var(--blue-mid);color:var(--blue)}
.edit-btn.active{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-mid)}
.add-btn{padding:5px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;border:none;background:var(--blue);color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.add-btn:hover{background:var(--blue-dark)}

/* ── DASHBOARD GRID ─────────────────────── */
.dashboard{padding:20px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;min-height:calc(100vh - var(--hdr) - var(--preset-bar))}
.w1{grid-column:span 1}
.w2{grid-column:span 2}
.w4{grid-column:span 4}

/* ── WIDGET BASE ────────────────────────── */
.widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:border-color .15s,box-shadow .15s,transform .15s;position:relative;display:flex;flex-direction:column}
.widget:hover{border-color:#C8C8D0}
.widget.edit-mode{cursor:grab;animation:jiggle .2s ease infinite alternate}
.widget.edit-mode:hover{box-shadow:var(--sh2);border-color:var(--blue-mid);transform:scale(1.01)}
@keyframes jiggle{from{transform:rotate(-.4deg)}to{transform:rotate(.4deg)}}
.drag-handle{display:none;position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);cursor:grab;align-items:center;justify-content:center;z-index:10}
.edit-mode .drag-handle{display:flex}

.w-head{padding:12px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border2);flex-shrink:0}
.w-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.w-icon.blue{background:var(--blue-bg)} .w-icon.green{background:var(--green-bg)} .w-icon.amber{background:var(--amber-bg)} .w-icon.red{background:var(--red-bg)} .w-icon.purple{background:var(--purple-bg)}
.w-icon svg{width:16px;height:16px}
.w-icon.blue svg{color:var(--blue)} .w-icon.green svg{color:var(--green)} .w-icon.amber svg{color:var(--amber)} .w-icon.red svg{color:var(--red)} .w-icon.purple svg{color:var(--purple)}
.w-title{font-size:12px;font-weight:700;color:var(--t1);flex:1}
.w-subtitle{font-size:10px;color:var(--t3);margin-top:1px}
.w-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.w-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px}
.w-badge.red{background:var(--red-bg);color:var(--red)} .w-badge.blue{background:var(--blue-bg);color:var(--blue)} .w-badge.green{background:var(--green-bg);color:var(--green)} .w-badge.amber{background:var(--amber-bg);color:var(--amber)}
.w-more{width:24px;height:24px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:.1s}
.w-more:hover{background:var(--surface2);color:var(--t2)}
.w-body{padding:12px 14px;flex:1;overflow:hidden}
.w-footer{padding:6px 14px 10px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:8px}
.w-link{font-size:11px;color:var(--blue);cursor:pointer;text-decoration:none;transition:.1s}
.w-link:hover{text-decoration:underline}

/* ── WIDGET TABS ────────────────────────── */
.w-tabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--rs);padding:2px;margin-bottom:10px}
.w-tab{flex:1;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;text-align:center;color:var(--t3);transition:.15s;border:none;background:transparent}
.w-tab.active{background:var(--surface);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.w-tab:hover:not(.active){color:var(--t2)}

/* ── KPI GRID ───────────────────────────── */
.kpi-grid{display:grid;gap:8px}
.kpi-grid.cols2{grid-template-columns:1fr 1fr}
.kpi-grid.cols4{grid-template-columns:repeat(4,1fr)}
.kpi-card{background:var(--surface2);border-radius:var(--rs);padding:10px 12px;border:1px solid var(--border2)}
.kpi-label{font-size:10px;color:var(--t3);margin-bottom:4px}
.kpi-num{font-size:26px;font-weight:800;line-height:1;letter-spacing:-1px}
.kpi-num.blue{color:var(--blue)} .kpi-num.green{color:var(--green)} .kpi-num.red{color:var(--red)} .kpi-num.amber{color:var(--amber)}
.kpi-trend{display:flex;align-items:center;gap:4px;margin-top:5px;font-size:10px}
.kpi-trend.up{color:var(--green-mid)} .kpi-trend.down{color:var(--red-mid)}
.kpi-bar{height:4px;background:var(--border2);border-radius:2px;margin-top:6px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ── CHARTS ─────────────────────────────── */
.chart-wrap{width:100%;overflow:hidden;position:relative}
.chart-legend{display:flex;gap:12px;font-size:10px;color:var(--t2);margin-bottom:8px;flex-wrap:wrap}
.chart-legend-item{display:flex;align-items:center;gap:4px}
.chart-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── VIOLATIONS ─────────────────────────── */
.viol-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2)}
.viol-row:last-child{border-bottom:none}
.viol-label{flex:1;font-size:11px;color:var(--t1)}
.viol-count{font-size:13px;font-weight:700;width:28px;text-align:right;flex-shrink:0}
.viol-bar{flex:0 0 80px;height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.viol-fill{height:100%;border-radius:3px}

/* ── FUNNEL ─────────────────────────────── */
.funnel-stage{margin-bottom:6px}
.funnel-stage-label{display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:3px}
.funnel-stage-bar{height:18px;border-radius:3px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;transition:width .4s}

/* ── TOP-5 ──────────────────────────────── */
.top-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)}
.top-row:last-child{border-bottom:none}
.top-rank{font-size:11px;font-weight:700;color:var(--t3);width:16px;flex-shrink:0}
.top-rank.gold{color:#B8860B} .top-rank.silver{color:#888} .top-rank.bronze{color:#A0522D}
.top-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.top-name{flex:1;font-size:11px;font-weight:500}
.top-dept{font-size:9px;color:var(--t3)}
.top-val{font-size:12px;font-weight:700;color:var(--blue);flex-shrink:0}
.top-bar-mini{width:60px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;flex-shrink:0}

/* ── TASKS TABLE ────────────────────────── */
.tasks-table{width:100%;border-collapse:collapse;font-size:11px}
.tasks-table th{text-align:left;padding:5px 8px;border-bottom:2px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);white-space:nowrap}
.tasks-table td{padding:6px 8px;border-bottom:1px solid var(--border2);vertical-align:middle}
.tasks-table tr:last-child td{border-bottom:none}
.tasks-table tr:hover td{background:var(--surface2)}
.task-priority{width:4px;height:24px;border-radius:2px;display:inline-block}
.status-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.status-new{background:var(--blue-bg);color:var(--blue)} .status-inprog{background:var(--green-bg);color:var(--green)} .status-overdue{background:var(--red-bg);color:var(--red)} .status-review{background:var(--amber-bg);color:var(--amber)} .status-done{background:var(--border2);color:var(--t3)}
.deadline{font-size:10px;color:var(--t2)} .deadline.overdue{color:var(--red);font-weight:600}

/* ── KANBAN ─────────────────────────────── */
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;height:220px;overflow:hidden}
.kanban-col{background:var(--surface2);border-radius:var(--rs);padding:8px;display:flex;flex-direction:column;border:1px solid var(--border2)}
.kanban-col-header{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.kanban-col-count{background:var(--surface);border-radius:8px;padding:1px 6px;font-size:9px;font-weight:700}
.k-card{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:7px 8px;margin-bottom:5px;cursor:grab;transition:.15s}
.k-card:hover{box-shadow:var(--sh);border-color:var(--blue-mid)}
.k-card-title{font-size:10px;font-weight:600;color:var(--t1);margin-bottom:4px;line-height:1.3}
.k-card-meta{display:flex;align-items:center;gap:4px}
.k-card-due{font-size:9px;color:var(--t3)}
.k-card-due.late{color:var(--red)}

/* ── QUICK ACCESS ───────────────────────── */
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.svc-tile{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:.15s;text-align:center}
.svc-tile:hover{background:var(--blue-bg);border-color:var(--blue-mid)}
.svc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.svc-name{font-size:9px;font-weight:600;color:var(--t2);line-height:1.3}

/* ── CALENDAR ───────────────────────────── */
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;text-align:center}
.cal-day-label{font-size:9px;font-weight:600;color:var(--t3);padding:2px 0;text-transform:uppercase}
.cal-day{font-size:10px;padding:4px 2px;border-radius:4px;cursor:pointer;transition:.1s;font-weight:500;color:var(--t2);text-align:center}
.cal-day:hover{background:var(--surface2)}
.cal-day.today{background:var(--blue);color:#fff;font-weight:700}
.cal-day.has-event{position:relative}
.cal-day.has-event::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue-mid)}
.cal-day.today.has-event::after{background:rgba(255,255,255,.8)}
.cal-events{display:flex;flex-direction:column;gap:4px}
.cal-event-item{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid var(--border2)}
.cal-event-item:last-child{border-bottom:none}
.cal-event-bar{width:3px;height:30px;border-radius:2px;flex-shrink:0;margin-top:2px}
.cal-event-time{font-size:9px;font-weight:600;color:var(--t3);width:32px;flex-shrink:0;margin-top:2px}
.cal-event-title{font-size:10px;font-weight:600;color:var(--t1);line-height:1.3}
.cal-event-loc{font-size:9px;color:var(--t3);margin-top:1px}

/* ── NEWS ───────────────────────────────── */
.news-item{padding:8px 0;border-bottom:1px solid var(--border2)}
.news-item:last-child{border-bottom:none}
.news-tag{display:inline-block;font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.news-title{font-size:11px;font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:2px}
.news-date{font-size:9px;color:var(--t3)}

/* ── NOTIFICATIONS ──────────────────────── */
.notif-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border2)}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.notif-text{font-size:11px;color:var(--t1);flex:1;line-height:1.4}
.notif-time{font-size:9px;color:var(--t3);flex-shrink:0;margin-top:1px}
.notif-item.unread .notif-text{font-weight:600}

/* ── ACTIVITY ───────────────────────────── */
.act-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)}
.act-item:last-child{border-bottom:none}
.act-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.act-text{font-size:11px;color:var(--t2);flex:1;line-height:1.4}
.act-text strong{color:var(--t1)}
.act-time{font-size:9px;color:var(--t3);flex-shrink:0}

/* ── DOCUMENTS/APPLICATIONS TABLE ──────── */
.doc-table{width:100%;border-collapse:collapse;font-size:11px}
.doc-table th{text-align:left;padding:5px 8px;border-bottom:2px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);white-space:nowrap}
.doc-table td{padding:6px 8px;border-bottom:1px solid var(--border2);vertical-align:middle}
.doc-table tr:last-child td{border-bottom:none}
.doc-table tr:hover td{background:var(--surface2)}
.doc-icon{width:22px;height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.doc-icon.pdf{background:var(--red-mid)} .doc-icon.docx{background:var(--blue)} .doc-icon.xlsx{background:var(--green)} .doc-icon.pptx{background:var(--amber-mid)}
.btn-action{font-size:9px;font-weight:700;padding:3px 10px;border-radius:4px;cursor:pointer;border:none;white-space:nowrap}
.btn-sign{background:var(--blue-bg);color:var(--blue)} .btn-approve{background:var(--green-bg);color:var(--green)} .btn-reject{background:var(--red-bg);color:var(--red)} .btn-view{background:var(--surface2);color:var(--t2)}

/* ── PROGRESS SLA ───────────────────────── */
.sla-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.sla-label{font-size:10px;color:var(--t2);flex:1}
.sla-bar-wrap{flex:0 0 100px}
.sla-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.sla-fill{height:100%;border-radius:3px}
.sla-pct{font-size:10px;font-weight:700;width:28px;text-align:right;flex-shrink:0}

/* ── REGULATORY TREE ────────────────────── */
.tree-item{padding:4px 0;border-bottom:1px solid var(--border2)}
.tree-item:last-child{border-bottom:none}
.tree-row{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0}
.tree-toggle{width:14px;height:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--t3);flex-shrink:0}
.tree-icon-file{width:12px;height:14px;flex-shrink:0}
.tree-label{font-size:10px;color:var(--t1);flex:1}
.tree-label.section{font-weight:600;font-size:11px}
.tree-count{font-size:9px;color:var(--t3);background:var(--surface2);padding:1px 6px;border-radius:8px}
.tree-sub{padding-left:20px}

/* ── DIRECTORY ──────────────────────────── */
.dir-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)}
.dir-row:last-child{border-bottom:none}
.dir-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.dir-info{flex:1}
.dir-name{font-size:11px;font-weight:600}
.dir-pos{font-size:9px;color:var(--t3)}
.dir-dept{font-size:9px;color:var(--blue);background:var(--blue-bg);padding:2px 7px;border-radius:10px;white-space:nowrap}
.dir-status{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dir-status.online{background:#3DC47E} .dir-status.away{background:#F0A830} .dir-status.offline{background:var(--border)}

/* ── SKELETON ───────────────────────────── */
.skeleton{background:linear-gradient(90deg,var(--border2) 25%,var(--surface2) 50%,var(--border2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── MISC ───────────────────────────────── */
.chip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block}
.chip.blue{background:var(--blue-bg);color:var(--blue)} .chip.green{background:var(--green-bg);color:var(--green)} .chip.amber{background:var(--amber-bg);color:var(--amber)} .chip.red{background:var(--red-bg);color:var(--red)} .chip.gray{background:var(--surface2);color:var(--t3)}
.search-bar{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:5px 10px;margin-bottom:8px}
.search-bar input{flex:1;border:none;background:transparent;font-size:11px;color:var(--t1);outline:none}
.search-bar input::placeholder{color:var(--t3)}
.empty-state{text-align:center;padding:24px 0;color:var(--t3)}
.empty-state svg{margin-bottom:8px;opacity:.3}
.empty-state p{font-size:11px}
.gantt-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border2)}
.gantt-label{font-size:10px;color:var(--t2);width:100px;flex-shrink:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.gantt-track{flex:1;height:14px;background:var(--border2);border-radius:3px;position:relative;overflow:hidden}
.gantt-bar{height:100%;border-radius:3px;position:absolute;top:0}

/* ── FAVORITES ──────────────────────────── */
.fav-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)}
.fav-item:last-child{border-bottom:none}
.fav-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fav-title{font-size:11px;font-weight:600;color:var(--t1)}
.fav-meta{font-size:9px;color:var(--t3)}
.fav-star{color:var(--amber-mid);font-size:12px;flex-shrink:0}

/* ── RESPONSIVE ─────────────────────────── */
@media(max-width:1200px){.dashboard{grid-template-columns:repeat(3,1fr)}.w4{grid-column:span 3}}
@media(max-width:900px){.dashboard{grid-template-columns:repeat(2,1fr)}.w2,.w4{grid-column:span 2}.hdr-search{display:none}}
@media(max-width:600px){.dashboard{grid-template-columns:1fr}.w1,.w2,.w4{grid-column:span 1}}

/* preset transitions */
.dashboard .widget{transition:opacity .2s ease,transform .2s ease}
.dashboard.switching .widget{opacity:0;transform:translateY(4px)}

function barChart(data, colors, labels, h=80){
  const max = Math.max(...data);
  const bars = data.map((v,i) => {
    const x = 10 + i * (300/data.length);
    const bh = (v/max) * (h-20);
    const y = h - bh - 2;
    const w = Math.max(8, 280/data.length - 4);
    const lbl = labels ? `<text x="${x+w/2}" y="${h+2}" text-anchor="middle" font-size="8" fill="#AEAEB5">${labels[i]||''}</text>` : '';
    return `<rect x="${x}" y="${y}" width="${w}" height="${bh}" rx="2" fill="${colors[i%colors.length]}" opacity=".85"/>
    <text x="${x+w/2}" y="${y-2}" text-anchor="middle" font-size="7" fill="#6B6B72">${v}</text>${lbl}`;
  }).join('');
  return `<svg width="100%" height="${h+12}" viewBox="0 0 320 ${h+12}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}

function lineChart(datasets, w=320, h=80){
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${datasets.map(({pts, color, fill}) => {
      const points = pts.map((p,i) => `${10+i*(w-20)/(pts.length-1)},${h-10-p*(h-20)/100}`).join(' ');
      const areaPoints = `10,${h-10} ` + pts.map((p,i) => `${10+i*(w-20)/(pts.length-1)},${h-10-p*(h-20)/100}`).join(' ') + ` ${w-10},${h-10}`;
      return `${fill ? `<polygon points="${areaPoints}" fill="${color}" opacity=".12"/>` : ''}
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>`;
    }).join('')}
  </svg>`;
}

function donutChart(pct, color, r=28, size=64){
  const circ = 2*Math.PI*r;
  const dash = circ * pct / 100;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E2E2E7" stroke-width="8"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${-circ/4}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2+4}" text-anchor="middle" font-size="13" font-weight="800" fill="${color}">${pct}%</text>
  </svg>`;
}

function heatmapSVG(){
  const days=['Пн','Вт','Ср','Чт','Пт'];
  const hours=9;
  let svg=`<div style="font-size:9px;color:var(--t3);margin-bottom:4px">Активность (нед × час)</div>`;
  days.forEach((d,di)=>{
    svg+=`<div style="display:flex;align-items:center;gap:2px;margin-bottom:2px">
      <span style="font-size:8px;width:14px;color:var(--t3)">${d}</span>`;
    for(let h=0;h<hours;h++){
      const o=(Math.sin(di*1.3+h*.8)+1)/2;
      svg+=`<div style="width:14px;height:14px;border-radius:2px;background:rgba(55,138,221,${(o*.8+.1).toFixed(2)})"></div>`;
    }
    svg+=`</div>`;
  });
  return svg;
}

function switchChartTab(btn, id){
  const body = btn.closest('.w-body');
  body.querySelectorAll('.w-tab').forEach(t=>t.classList.remove('active'));
  body.querySelectorAll('.chart-content').forEach(c=>c.style.display='none');
  btn.classList.add('active');
  const el = document.getElementById('chart-'+id);
  if(el) el.style.display='block';
}

function switchTasksTab(btn, mode){
  const dashboard = document.getElementById('dashboard');
  const old = document.getElementById('w-tasks');
  if(!old) return;
  const span = old.className.match(/w[124]|w4/)?.[0] || 'w4';
  const newWidget = document.createElement('div');
  newWidget.innerHTML = mode==='kanban' ? widgetTasksKanban(span)
                       : mode==='gantt'  ? widgetTasksGantt(span)
                       : widgetTasks(span,'list');
  const el = newWidget.firstElementChild;
  old.replaceWith(el);
}

// ════════════════════════════════════════════
//  SPECIAL CASES FOR TASK PRESET
// ════════════════════════════════════════════
function buildPreset(name){
  const db = document.getElementById('dashboard');
  db.classList.add('switching');
  setTimeout(()=>{
    db.innerHTML='';
    db.classList.remove('switching');
    if(name==='tasks'){
      db.innerHTML = widgetTasks('w4','list')
        + widgetKPI(1) + widgetCalendar('w1') + widgetQuickAccess('w1') + widgetActivity('w1')
        + widgetFavorites('w1') + widgetApplications('w2');
    } else if(name==='analytics'){
      db.innerHTML = widgetChart('w4')
        + widgetKPI(2) + widgetFunnel('w2')
        + widgetViolations('w2') + widgetTop5('w1') + widgetActivity('w1') + widgetCalendar('w1') + widgetNotifications('w1');
    } else if(name==='documents'){
      db.innerHTML = widgetDocuments('w4')
        + widgetApplications('w2') + widgetRegulatory('w2')
        + widgetNotifications('w1') + widgetQuickAccess('w1') + widgetDirectory('w1') + widgetKPI(1);
    } else {
      // overview
      db.innerHTML = widgetKPI(2) + widgetViolations('w2')
        + widgetCalendar('w1') + widgetNotifications('w1') + widgetNews('w1') + widgetQuickAccess('w1');
    }
  },160);
}

function setPreset(name, btn){
  document.querySelectorAll('.preset-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildPreset(name);
}

// ════════════════════════════════════════════
//  EDIT MODE
// ════════════════════════════════════════════
function toggleEdit(){
  const btn = document.getElementById('editBtn');
  const db = document.getElementById('dashboard');
  const active = btn.classList.toggle('active');
  btn.innerHTML = active
    ? `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg> Готово`
    : `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Настроить`;
  db.querySelectorAll('.widget').forEach(w=>{
    if(active) w.classList.add('edit-mode');
    else w.classList.remove('edit-mode');
  });
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
buildPreset('overview');
